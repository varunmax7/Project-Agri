databases:
  - name: floodguard-db
    databaseName: floodguard
    user: floodguard_user
    plan: free

services:
  - type: redis
    name: floodguard-redis
    plan: starter
    ipAllowList: [] # Allows internal connections only

  - type: web
    name: floodguard-web
    env: python
    buildCommand: "./build.sh"
    startCommand: "./start.sh"
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: floodguard-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: floodguard-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
      - key: DJANGO_SETTINGS_MODULE
        value: "config.settings.prod"

  - type: worker
    name: floodguard-celery-worker
    env: python
    buildCommand: "./build.sh"
    startCommand: "celery -A config worker -l INFO"
    plan: starter
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: floodguard-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: floodguard-redis
          property: connectionString
      - key: SECRET_KEY
        fromService:
          type: web
          name: floodguard-web
          envVarKey: SECRET_KEY
      - key: DJANGO_SETTINGS_MODULE
        value: "config.settings.prod"

  - type: worker
    name: floodguard-celery-beat
    env: python
    buildCommand: "./build.sh"
    startCommand: "celery -A config beat -l INFO"
    plan: starter
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: floodguard-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: floodguard-redis
          property: connectionString
      - key: SECRET_KEY
        fromService:
          type: web
          name: floodguard-web
          envVarKey: SECRET_KEY
      - key: DJANGO_SETTINGS_MODULE
        value: "config.settings.prod"
