upstream floodguard_web {
    server web:8000;
}

server {
    listen 80;
    server_name _;

    # Increase max upload size for media uploads (if any)
    client_max_body_size 20M;

    location / {
        proxy_pass http://floodguard_web;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_redirect off;
    }

    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    location /media/ {
        alias /app/media/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }
}
